<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles-registro.css">
    <title>Registro de Usuario</title>
</head>
<body>
    <div class="form-container">
        <h2>Registro de Usuario</h2>
        <form id="registerForm">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" required>

            <label for="correo">Correo Institucional:</label>
            <input type="email" id="correo" name="correo" required>
            <div class="info-text">Usa tu correo institucional (@edu para estudiantes, @doc para docentes)</div>

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required minlength="8">
            <div class="info-text">Mínimo 8 caracteres</div>

            <div id="mensajeTipoUsuario" class="user-type-message hidden"></div>

            <div id="seccionEstudiante" class="hidden">
                <label for="carrera">Carrera:</label>
                <select id="carrera" name="carrera">
                    <option value="">Selecciona una carrera</option>
                    <option value="Ingeniería en Sistemas">Ingeniería en Sistemas</option>
                    <option value="Administración">Administración</option>
                    <option value="Derecho">Derecho</option>
                    <option value="Criminología">Criminología</option>
                    <option value="Psicología">Psicología</option>
                    <option value="Turismo">Turismo</option>
                    <option value="Diseño Gráfico">Diseño Gráfico</option>
                    <option value="Pedagogía">Pedagogía</option>
                    <option value="Comercio">Comercio</option>
                </select>

                <label for="cuatrimestre">Cuatrimestre:</label>
                <select id="cuatrimestre" name="cuatrimestre">
                    <option value="">Selecciona tu cuatrimestre</option>
                    <option value="1">1° Cuatrimestre</option>
                    <option value="2">2° Cuatrimestre</option>
                    <option value="3">3° Cuatrimestre</option>
                    <option value="4">4° Cuatrimestre</option>
                    <option value="5">5° Cuatrimestre</option>
                    <option value="6">6° Cuatrimestre</option>
                    <option value="7">7° Cuatrimestre</option>
                    <option value="8">8° Cuatrimestre</option>
                    <option value="9">9° Cuatrimestre</option>
                </select>
            </div>

            <div id="seccionDocente" class="hidden">
                <label for="departamento">Departamento:</label>
                <select id="departamento" name="departamento">
                    <option value="">Selecciona tu departamento</option>
                    <option value="Psicología Clínica">Psicología Clínica</option>
                    <option value="Psicología Educativa">Psicología Educativa</option>
                    <option value="Orientación">Orientación</option>
                </select>
            </div>

            <button type="submit">Registrarse</button>
            <div id="mensajeError" class="error hidden"></div>
        </form>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const correoInput = document.getElementById('correo');
        const seccionEstudiante = document.getElementById('seccionEstudiante');
        const seccionDocente = document.getElementById('seccionDocente');
        const mensajeTipoUsuario = document.getElementById('mensajeTipoUsuario');
        let tipo_usuario = '';

        correoInput.addEventListener('input', (e) => {
            const correo = e.target.value;
            seccionEstudiante.classList.add('hidden');
            seccionDocente.classList.add('hidden');
            mensajeTipoUsuario.classList.add('hidden');

            if(correo.includes('@edu')) {
                seccionEstudiante.classList.remove('hidden');
                mensajeTipoUsuario.textContent = 'Registro como Estudiante';
                mensajeTipoUsuario.classList.remove('hidden');
                tipo_usuario = 'estudiante';
            } else if(correo.includes('@doc')) {
                seccionDocente.classList.remove('hidden');
                mensajeTipoUsuario.textContent = 'Registro como Docente / Psicólogo';
                mensajeTipoUsuario.classList.remove('hidden');
                tipo_usuario = 'docente';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const mensajeError = document.getElementById('mensajeError');
            mensajeError.classList.add('hidden');
            const correo = correoInput.value;

            try {
                const q = query(collection(db, "usuarios"), where("correo", "==", correo));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    mensajeError.textContent = 'Este correo ya está registrado';
                    mensajeError.classList.remove('hidden');
                    return;
                }
                
                const userData = {
                    nombre: document.getElementById('nombre').value,
                    correo: correo,
                    telefono: document.getElementById('telefono').value,
                    password: document.getElementById('password').value,
                    tipo_usuario: tipo_usuario,
                    carrera: document.getElementById('carrera')?.value || null,
                    cuatrimestre: document.getElementById('cuatrimestre')?.value || null,
                    departamento: document.getElementById('departamento')?.value || null,
                    fecha_registro: new Date().toISOString()
                };
                
                await addDoc(collection(db, "usuarios"), userData);
                
                alert(`¡Registro exitoso! Bienvenido ${userData.nombre}`);
                window.location.href = 'login.html';
                
            } catch (error) {
                mensajeError.textContent = 'Error al registrar: ' + error.message;
                mensajeError.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
