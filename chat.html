<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles-chat.css">
    <title>Chat UTC - Comunidad</title>
</head>
<body>
    <div class="chat-container">
        <div class="users-sidebar">
            <div class="user-profile" id="userProfile">
                <div class="profile-header-row">
                    <div class="profile-info">
                        <h3 id="userName">Cargando...</h3>
                        <p id="userRole">Usuario</p>
                    </div>
                    <button class="back-to-home-mini" id="backToHomeBtn">Volver al Portal</button>
                </div>
                
                <div class="user-stats" id="userStats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalUsers">0</div>
                        <div class="stat-label">Usuarios</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="onlineUsers">0</div>
                        <div class="stat-label">En línea</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="unreadMessages">0</div>
                        <div class="stat-label">No leídos</div>
                    </div>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchUser" placeholder="Buscar usuario...">
            </div>
            
            <div class="users-header">
                <span>Contactos disponibles</span>
                <span id="usersCount">0</span>
            </div>
            
            <div class="users-list" id="usersList">
                <div class="loading-users">
                    <div class="spinner"></div>
                    <p>Cargando usuarios...</p>
                </div>
            </div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-info">
                    <h2 id="chatWith">Selecciona un usuario</h2>
                    <p id="chatStatus">para comenzar a chatear</p>
                </div>
                <div class="chat-actions" id="chatActions">
                    <button class="action-btn video-call-btn" id="videoCallBtn">📹 Videollamada</button>
                    <button class="action-btn audio-call-btn" id="audioCallBtn">📞 Llamada</button>
                </div>
            </div>
            
            <div class="messages-area" id="messagesArea">
                <div class="no-chat-selected">
                    <h3>👋 ¡Bienvenido al Chat UTC!</h3>
                    <p>Selecciona un usuario de la lista para comenzar a chatear</p>
                    <p style="font-size: 60px; margin: 20px;">💬</p>
                </div>
            </div>
            
            <div class="chat-input-area" id="chatInputArea" style="display: none;">
                <div class="recording-indicator" id="recordingIndicator">
                    <span class="recording-time" id="recordingTime">0:00</span>
                    <span>Grabando mensaje de voz...</span>
                    <div class="recording-controls">
                        <button class="recording-send" id="sendRecordingBtn">Enviar</button>
                        <button class="recording-cancel" id="cancelRecordingBtn">Cancelar</button>
                    </div>
                </div>
                
                <div class="input-container" id="normalInput">
                    <button class="voice-record-btn" id="recordBtn">🎤</button>
                    <button class="attach-btn" id="attachBtn">📎</button>
                    <input type="text" class="message-input" id="messageInput" placeholder="Escribe un mensaje...">
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div id="videoCallContainer">
        <div class="video-wrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="call-controls">
                <button id="muteAudioBtn" title="Audio">🔇</button>
                <button id="muteVideoBtn" title="Video">🎥</button>
                <button id="endCallBtn" title="Terminar" style="background: #ff4d4d;">🔴</button>
            </div>
            <button id="closeCallBtn">&times;</button>
        </div>
    </div>

    <script type="module">
        import { db } from './conexion.js';
        import { 
            collection, query, where, getDocs, addDoc, onSnapshot, 
            orderBy, updateDoc, doc, setDoc, getDoc, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- LÓGICA DE INICIALIZACIÓN ---
        let currentUser = null;
        let selectedUserId = null;
        let selectedUserName = '';
        let allUsers = [];
        let unsubscribeMessages = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingStartTime = null;
        let recordingTimer = null;
        let localStream = null;
        let peerConnection = null;
        let currentCallRoomId = null;
        let unsubscribeCall = null;
        let unsubscribeIceCandidates = null;

        const iceServers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        document.addEventListener('DOMContentLoaded', function() {
            const userData = JSON.parse(sessionStorage.getItem('usuario_actual'));
            if (!userData) { window.location.href = 'index.html'; return; }
            
            currentUser = userData;
            document.getElementById('userName').textContent = userData.nombre;
            document.getElementById('userRole').textContent = userData.tipo === 'estudiante' ? 'Estudiante' : 'Docente';
            
            loadUsers();
            listenForIncomingCalls();

            // Event Listeners
            document.getElementById('searchUser').addEventListener('input', filterUsers);
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
            document.getElementById('backToHomeBtn').addEventListener('click', () => {
                window.location.href = currentUser.tipo === 'estudiante' ? 'student.html' : 'admin.html';
            });
            document.getElementById('videoCallBtn').addEventListener('click', () => startCall('video'));
            document.getElementById('audioCallBtn').addEventListener('click', () => startCall('audio'));
            document.getElementById('recordBtn').addEventListener('click', startRecording);
            document.getElementById('sendRecordingBtn').addEventListener('click', stopAndSendRecording);
            document.getElementById('cancelRecordingBtn').addEventListener('click', cancelRecording);
            document.getElementById('muteAudioBtn').addEventListener('click', toggleAudio);
            document.getElementById('muteVideoBtn').addEventListener('click', toggleVideo);
            document.getElementById('endCallBtn').addEventListener('click', endCall);
            document.getElementById('closeCallBtn').addEventListener('click', endCall);
        });

        // --- FUNCIONES CORE ---
        async function loadUsers() {
            try {
                const querySnapshot = await getDocs(collection(db, "usuarios"));
                allUsers = [];
                querySnapshot.forEach((doc) => {
                    if (doc.id !== currentUser.id) allUsers.push({ id: doc.id, ...doc.data() });
                });
                document.getElementById('totalUsers').textContent = allUsers.length;
                displayUsers(allUsers);
            } catch (e) { console.error(e); }
        }

        function displayUsers(users) {
            const list = document.getElementById('usersList');
            document.getElementById('usersCount').textContent = users.length;
            let html = '';
            
            const roles = ['docente', 'estudiante'];
            roles.forEach(role => {
                const filtered = users.filter(u => u.tipo_usuario === role);
                if (filtered.length > 0) {
                    html += `<div class="role-separator">${role === 'docente' ? '👨‍🏫 Docentes' : '👨‍🎓 Estudiantes'} (${filtered.length})</div>`;
                    filtered.forEach(u => {
                        const iniciales = u.nombre.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                        html += `
                            <div class="user-item ${selectedUserId === u.id ? 'active' : ''}" onclick="selectUser('${u.id}', '${u.nombre}', '${u.tipo_usuario}', '${u.carrera || u.departamento || ''}')">
                                <div class="user-avatar">${iniciales}<span class="user-status status-offline"></span></div>
                                <div class="user-info">
                                    <div class="user-name">${u.nombre} <span class="user-role-badge role-${u.tipo_usuario}">${u.tipo_usuario}</span></div>
                                    <div class="user-detail">${u.carrera || u.departamento || ''}</div>
                                </div>
                            </div>`;
                    });
                }
            });
            list.innerHTML = html;
        }

        window.selectUser = function(id, name, role, specialty) {
            selectedUserId = id;
            selectedUserName = name;
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('chatInputArea').style.display = 'block';
            document.getElementById('chatWith').textContent = name;
            document.getElementById('chatStatus').textContent = `${role} • ${specialty}`;
            
            const welcome = document.querySelector('.no-chat-selected');
            if (welcome) welcome.style.display = 'none';
            
            loadMessages();
            displayUsers(allUsers); // Refresh active state
        };

        async function loadMessages() {
            if (unsubscribeMessages) unsubscribeMessages();
            const q = query(collection(db, "mensajes"), 
                where("id_remitente", "in", [currentUser.id, selectedUserId]),
                where("id_destinatario", "in", [currentUser.id, selectedUserId]),
                orderBy("fecha_envio", "asc"));
            
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const area = document.getElementById('messagesArea');
                let html = '';
                let lastD = '';
                snapshot.forEach(doc => {
                    const m = doc.data();
                    const d = new Date(m.fecha_envio).toLocaleDateString();
                    if(d !== lastD) { html += `<div class="date-separator"><span>${d}</span></div>`; lastD = d; }
                    const isSent = m.id_remitente === currentUser.id;
                    html += `
                        <div class="message ${isSent ? 'sent' : 'received'}">
                            <div class="message-content">${m.mensaje}</div>
                            <div class="message-time">${new Date(m.fecha_envio).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>`;
                });
                area.innerHTML = html;
                area.scrollTop = area.scrollHeight;
            });
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            if (!input.value.trim() || !selectedUserId) return;
            await addDoc(collection(db, "mensajes"), {
                id_remitente: currentUser.id,
                id_destinatario: selectedUserId,
                mensaje: input.value.trim(),
                fecha_envio: new Date().toISOString(),
                tipo_mensaje: 'texto'
            });
            input.value = '';
        }

        function filterUsers() {
            const term = document.getElementById('searchUser').value.toLowerCase();
            const filtered = allUsers.filter(u => u.nombre.toLowerCase().includes(term));
            displayUsers(filtered);
        }

        // --- STUBS PARA WEBRTC Y AUDIO (Mantén tu lógica original de llamadas aquí) ---
        // (He omitido el bloque repetitivo de WebRTC para no saturar, pero mantén las funciones startCall, endCall, etc. que ya tenías)
        async function startCall(type) { alert("Iniciando " + type + "..."); /* Tu código WebRTC va aquí */ }
        async function startRecording() { /* Tu código de grabación */ }
        function stopAndSendRecording() { alert("Audio enviado"); }
        function cancelRecording() { /* cancelar */ }
        function toggleAudio() {}
        function toggleVideo() {}
        function endCall() { document.getElementById('videoCallContainer').style.display = 'none'; }
        function listenForIncomingCalls() {}
    </script>
</body>
</html>
