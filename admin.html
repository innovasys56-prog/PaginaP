<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal del Docente UTC - Subir Test</title>
  <style>
    :root {
      --primary-color: #004080;
      --secondary-color: #003366;
      --background-color: #f8fafc;
      --card-color: #ffffff;
      --text-color: #333333;
      --border-color: #e0e6ed;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--background-color);
      color: var(--text-color);
    }
    
    header {
      background-color: var(--primary-color);
      color: white;
      padding: 25px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
    }
    
    .profile-header {
      background-color: var(--primary-color);
      color: white;
      padding: 30px;
      border-radius: 10px 10px 0 0;
      text-align: center;
      position: relative;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .profile-picture {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
      margin-bottom: 15px;
      background-color: #ccc;
      display: inline-block;
    }
    
    .profile-body {
      padding: 30px;
      background-color: var(--card-color);
      border-radius: 0 0 10px 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }
    
    .info-section {
      margin-bottom: 30px;
    }
    
    .info-section h2 {
      color: var(--primary-color);
      margin-top: 0;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border-color);
    }
    
    .info-docente {
      background-color: #e6f0ff;
      padding: 20px;
      margin-bottom: 25px;
      border-radius: 8px;
      color: var(--secondary-color);
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .info-item {
      margin-bottom: 15px;
    }
    
    .info-label {
      font-weight: 600;
      display: block;
      margin-bottom: 5px;
      color: var(--secondary-color);
    }
    
    .info-value {
      padding: 10px;
      background-color: #f8f9fa;
      border-radius: 5px;
      border-left: 3px solid var(--primary-color);
    }
    
    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      color: var(--secondary-color);
    }
    
    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 15px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    
    input:focus, textarea:focus, select:focus {
      border-color: var(--primary-color);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 64, 128, 0.1);
    }
    
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    
    button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s;
      width: 100%;
    }
    
    button:hover {
      background-color: var(--secondary-color);
      transform: translateY(-2px);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .logout-btn {
      background-color: #d9534f;
      margin-top: 30px;
    }
    
    .logout-btn:hover {
      background-color: #c9302c;
    }
    
    .alert {
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
      display: none;
    }
    
    .alert-success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .alert-error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .loading {
      display: none;
      text-align: center;
      margin: 15px 0;
    }
    
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: var(--primary-color);
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 0 15px;
      }
      
      .profile-header, .profile-body {
        padding: 20px;
      }
      
      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Portal del Docente UTC - Plantel Ecatepec</h1>
  </header>
  
  <div class="container">
    <div class="profile-header">
      <div class="profile-picture" id="profilePicture"></div>
      <h1 id="docenteName">Cargando...</h1>
      <h3 id="docenteEmail">Correo institucional</h3>
    </div>
    
    <div class="profile-body">
      <div class="info-docente">
        <h2>Información del Docente</h2>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Nombre Completo:</span>
            <div class="info-value" id="fullName">-</div>
          </div>
          
          <div class="info-item">
            <span class="info-label">Tipo de Usuario:</span>
            <div class="info-value" id="tipoUsuario">-</div>
          </div>
          
          <div class="info-item">
            <span class="info-label">Correo Institucional:</span>
            <div class="info-value" id="correoDocente">-</div>
          </div>
          
          <div class="info-item">
            <span class="info-label">Departamento:</span>
            <div class="info-value" id="departamento">-</div>
          </div>
          
          <div class="info-item">
            <span class="info-label">Teléfono:</span>
            <div class="info-value" id="telefonoDocente">-</div>
          </div>
        </div>
      </div>
      
      <div class="info-section">
        <h2>Subir nuevo test</h2>
        
        <!-- Mensajes de alerta -->
        <div id="alertSuccess" class="alert alert-success"></div>
        <div id="alertError" class="alert alert-error"></div>
        
        <!-- Spinner de carga -->
        <div id="loading" class="loading">
          <div class="spinner"></div>
          <p>Guardando test, por favor espere...</p>
        </div>
        
        <form id="testForm">
          <label for="titulo">Título del test</label>
          <input type="text" id="titulo" name="titulo" required minlength="5" maxlength="100">
          
          <label for="tipoTest">Tipo de test</label>
          <select id="tipoTest" name="tipoTest" required>
            <option value="">Seleccione un tipo</option>
            <option value="academico">Área académica</option>
            <option value="iq">Test de IQ</option>
            <option value="personalidad">Test de personalidad</option>
          </select>
          
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" name="descripcion" rows="4" required minlength="10" maxlength="500"></textarea>
          
          <label for="enlace">Enlace al test (URL)</label>
          <input type="url" id="enlace" name="enlace" placeholder="https://ejemplo.com/test" required pattern="https?://.+">
          
          <input type="hidden" id="profesor" name="profesor">
          
          <button type="submit" id="submitBtn">Guardar Test</button>
        </form>
      </div>
      
      <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Obtener datos del docente desde sessionStorage
      const userData = JSON.parse(sessionStorage.getItem('usuario_actual'));
      
      if (userData && userData.nombre && userData.correo) {
        // Mostrar datos en la interfaz
        document.getElementById('docenteName').textContent = userData.nombre;
        document.getElementById('docenteEmail').textContent = userData.correo;
        document.getElementById('fullName').textContent = userData.nombre;
        document.getElementById('correoDocente').textContent = userData.correo;
        document.getElementById('tipoUsuario').textContent = 'Docente';
        document.getElementById('departamento').textContent = userData.departamento || 'No especificado';
        document.getElementById('telefonoDocente').textContent = userData.telefono || 'No especificado';
        document.getElementById('profesor').value = userData.nombre;
        
        // Generar iniciales para la foto de perfil
        const initials = userData.nombre.split(' ').map(n => n[0]).join('').toUpperCase();
        const profilePicture = document.getElementById('profilePicture');
        profilePicture.innerHTML = `<span style="font-size: 48px; line-height: 120px; color: white;">${initials}</span>`;
      } else {
        // Si no hay datos, redirigir al login
        alert('Por favor inicie sesión primero');
        window.location.href = 'index.html';
      }
      
      // Manejar envío del formulario
      document.getElementById('testForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Ocultar alertas anteriores
        hideAlerts();
        
        // Mostrar spinner de carga
        showLoading(true);
        
        // Deshabilitar botón para evitar múltiples envíos
        document.getElementById('submitBtn').disabled = true;
        
        try {
          // Validar campos antes de enviar
          if (!validateForm()) {
            return;
          }
          
          // Crear FormData con los datos del formulario
          const formData = new FormData(this);
          
          // Enviar datos al servidor
          const response = await fetch('guardar_test.php', {
            method: 'POST',
            body: formData,
            headers: {
              'Accept': 'application/json'
            }
          });
          
          // Verificar si la respuesta es OK
          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || 'Error en la respuesta del servidor');
          }
          
          const data = await response.json();
          
          if (data.success) {
            showSuccess('Test guardado correctamente con ID: ' + data.id);
            this.reset();
          } else {
            throw new Error(data.error || 'Error al guardar el test');
          }
        } catch (error) {
          console.error('Error detallado:', error);
          showError(error.message || 'Ocurrió un error al comunicarse con el servidor');
        } finally {
          // Ocultar spinner y habilitar botón
          showLoading(false);
          document.getElementById('submitBtn').disabled = false;
        }
      });
      
      // Manejar cierre de sesión
      document.getElementById('logoutBtn').addEventListener('click', function() {
        // Limpiar sessionStorage
        sessionStorage.removeItem('usuario_actual');
        
        // Redirigir al login
        window.location.href = 'index.html';
      });
      
      // Funciones auxiliares
      function validateForm() {
        const titulo = document.getElementById('titulo').value.trim();
        const tipoTest = document.getElementById('tipoTest').value;
        const descripcion = document.getElementById('descripcion').value.trim();
        const enlace = document.getElementById('enlace').value.trim();
        
        // Validar campos vacíos
        if (!titulo || !tipoTest || !descripcion || !enlace) {
          showError('Todos los campos son obligatorios');
          return false;
        }
        
        // Validar URL
        try {
          new URL(enlace);
        } catch (e) {
          showError('Por favor ingrese una URL válida (debe comenzar con http:// o https://)');
          return false;
        }
        
        return true;
      }
      
      function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
      }
      
      function hideAlerts() {
        document.getElementById('alertSuccess').style.display = 'none';
        document.getElementById('alertError').style.display = 'none';
      }
      
      function showSuccess(message) {
        const alert = document.getElementById('alertSuccess');
        alert.textContent = message;
        alert.style.display = 'block';
        // Ocultar después de 5 segundos
        setTimeout(() => alert.style.display = 'none', 5000);
      }
      
      function showError(message) {
        const alert = document.getElementById('alertError');
        alert.textContent = message;
        alert.style.display = 'block';
      }
    });
  </script>
</body>
</html>
