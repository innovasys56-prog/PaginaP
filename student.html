<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles-student.css">
    <title>Portal del Estudiante UTC</title>
</head>
<body>
    <header>
        <h1>Portal del Estudiante UTC - Plantel Ecatepec</h1>
    </header>
    
    <div class="container">
        <div class="profile-header">
            <div class="profile-picture" id="profilePicture"></div>
            <h1 id="studentName">Cargando...</h1>
            <h3 id="studentCareer">Carrera</h3>
        </div>
        
        <div class="profile-body">
            <div class="info-section">
                <h2>Información Personal</h2>
                
                <div class="info-item">
                    <span class="info-label">Nombre Completo:</span>
                    <div class="info-value" id="fullName">-</div>
                </div>
                
                <div class="info-item">
                    <span class="info-label">Matrícula:</span>
                    <div class="info-value" id="studentId">-</div>
                </div>
                
                <div class="info-item">
                    <span class="info-label">Teléfono:</span>
                    <div class="info-value" id="studentPhone">-</div>
                </div>
                
                <div class="info-item">
                    <span class="info-label">Correo:</span>
                    <div class="info-value" id="studentEmail">-</div>
                </div>
            </div>
            
            <div class="info-section">
                <h2>Información Académica</h2>
                
                <div class="info-item">
                    <span class="info-label">Carrera:</span>
                    <div class="info-value" id="studentCareerInfo">-</div>
                </div>
                
                <div class="info-item">
                    <span class="info-label">Cuatrimestre:</span>
                    <div class="info-value" id="studentSemester">-</div>
                </div>
                
                <div class="info-item">
                    <span class="info-label">Grupo:</span>
                    <div class="info-value" id="studentGroup">-</div>
                </div>
                
                <div class="info-item">
                    <span class="info-label">Turno:</span>
                    <div class="info-value" id="studentShift">-</div>
                </div>
                
                <button class="chat-btn" id="chatBtn">💬 Chat con Comunidad UTC</button>
                
                <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
            </div>
        </div>
        
        <div class="tests-section">
            <h2>Tests disponibles</h2>
            <div class="tests-container" id="testsContainer">
                <div class="loading-tests">
                    <div class="spinner"></div>
                    <p>Cargando tests disponibles...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './conexion.js';
        import { collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', function() {
            const userData = JSON.parse(sessionStorage.getItem('usuario_actual'));
            
            if (userData && userData.nombre && userData.carrera) {
                document.getElementById('studentName').textContent = userData.nombre;
                document.getElementById('studentCareer').textContent = userData.carrera;
                
                document.getElementById('fullName').textContent = userData.nombre || 'No especificado';
                document.getElementById('studentId').textContent = userData.matricula || 'No especificado';
                document.getElementById('studentPhone').textContent = userData.telefono || 'No especificado';
                document.getElementById('studentEmail').textContent = userData.correo || 'No especificado';
                
                document.getElementById('studentCareerInfo').textContent = userData.carrera || 'No especificado';
                document.getElementById('studentSemester').textContent = userData.cuatrimestre || 'No especificado';
                document.getElementById('studentGroup').textContent = userData.grupo || 'No especificado';
                document.getElementById('studentShift').textContent = userData.turno || 'No especificado';
                
                const initials = userData.nombre.split(' ').map(n => n[0]).join('').toUpperCase();
                const profilePicture = document.getElementById('profilePicture');
                profilePicture.innerHTML = `<span style="font-size: 48px; line-height: 120px; color: white;">${initials}</span>`;
            } else {
                alert('Por favor inicie sesión primero');
                window.location.href = 'index.html';
            }
            
            document.getElementById('chatBtn').addEventListener('click', function() {
                window.location.href = 'chat.html';
            });
            
            document.getElementById('logoutBtn').addEventListener('click', function() {
                sessionStorage.removeItem('usuario_actual');
                window.location.href = 'index.html';
            });
            
            cargarTests();
            
            async function cargarTests() {
                const container = document.getElementById('testsContainer');
                
                try {
                    const querySnapshot = await getDocs(collection(db, "Tests"));
                    const tests = [];
                    
                    querySnapshot.forEach((doc) => {
                        tests.push({ id: doc.id, ...doc.data() });
                    });
                    
                    mostrarTests(tests);
                } catch (error) {
                    console.error("Error al cargar tests:", error);
                    mostrarErrorTests(`Error al cargar tests: ${error.message}`);
                }
            }
            
            function mostrarTests(tests) {
                const container = document.getElementById('testsContainer');
                
                if (!tests || tests.length === 0) {
                    container.innerHTML = `
                        <div class="no-tests">
                            <p>No hay tests disponibles actualmente.</p>
                            <p>Por favor, revisa más tarde o contacta a tu profesor.</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                
                tests.forEach(test => {
                    if (!test.Link || !test.Nombre_Test) {
                        return;
                    }
                    
                    const tipoInfo = obtenerTipoInfo(test.tipoTest);
                    
                    html += `
                        <div class="test-card">
                            <h3 class="test-title">${test.Nombre_Test}</h3>
                            <span class="test-type">
                                ${tipoInfo.nombre}
                            </span>
                            <div class="test-actions">
                                <a href="#" class="test-link" data-id="${test.id}" data-url="${test.Link}">
                                    Realizar test
                                </a>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html || `
                    <div class="no-tests">
                        <p>No se encontraron tests válidos.</p>
                    </div>
                `;
                
                document.querySelectorAll('.test-link').forEach(link => {
                    link.addEventListener('click', async function(e) {
                        e.preventDefault();
                        const testId = this.dataset.id;
                        const url = this.dataset.url;
                        
                        try {
                            const testRef = doc(db, "Tests", testId);
                            await updateDoc(testRef, {
                                accesos: (tests.find(t => t.id === testId).accesos || 0) + 1
                            });
                            window.open(url, '_blank');
                        } catch (error) {
                            console.error("Error al registrar acceso:", error);
                            window.open(url, '_blank');
                        }
                    });
                });
            }
            
            function obtenerTipoInfo(tipo) {
                const tipos = {
                    'academico': { nombre: 'Área Académica' },
                    'iq': { nombre: 'Test de IQ' },
                    'personalidad': { nombre: 'Test de Personalidad' }
                };
                return tipos[tipo?.toLowerCase()] || { nombre: tipo || 'Test' };
            }
            
            function mostrarErrorTests(mensaje) {
                const container = document.getElementById('testsContainer');
                container.innerHTML = `
                    <div class="error-message">
                        <p>${mensaje}</p>
                        <button onclick="window.location.reload()" class="retry-btn">
                            Reintentar
                        </button>
                    </div>
                `;
            }
        });
    </script>
</body>

</html>
